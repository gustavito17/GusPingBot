# ──────────────────────────────────────────
#  Always-On Ping Bot — Application Config
# ──────────────────────────────────────────

spring.application.name=always-on-ping-bot

# --- Ping targets (override via env var PINGBOT_TARGETS) ---
# Comma-separated list of URLs to keep alive
pingbot.targets=https://my-service-1.onrender.com,https://my-service-2.onrender.com

# Cron expression: default = every 10 minutes
# Override with env var PINGBOT_CRON
pingbot.cron=0 */10 * * * *

# HTTP timeout per request in seconds
pingbot.timeout-seconds=10

# Retries on transient failures
pingbot.max-retries=2

# --- Alertas (opcional, configurar via env vars) ---
# pingbot.alert.discord-webhook-url=https://discord.com/api/webhooks/ID/TOKEN
# pingbot.alert.slack-webhook-url=https://hooks.slack.com/services/T/B/TOKEN
pingbot.alert.failure-threshold=1

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=Always-On Ping Bot
info.app.version=1.0.0
info.app.description=Keeps cloud services alive via scheduled HTTP pings

# --- Server ---
server.port=${PORT:8080}

# --- Logging ---
logging.level.py.fpuna.pingbot=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
